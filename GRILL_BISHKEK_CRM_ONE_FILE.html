  <style>
    :root {
      --yellow:#f5c72e;
      --yellow-2:#ffdc58;
      --red:#e5221e;
      --red-dark:#b91310;
      --ink:#15120e;
      --ink-2:#27221c;
      --paper:#f5f6f2;
      --card:#ffffff;
      --muted:#72706a;
      --line:#e8e7e1;
      --green:#138a55;
      --green-soft:#e8f7ef;
      --blue:#2563eb;
      --blue-soft:#eaf1ff;
      --amber:#b66b00;
      --amber-soft:#fff4dc;
      --violet:#7c3aed;
      --violet-soft:#f2eaff;
      --shadow:0 18px 50px rgba(30,24,13,.08);
      --shadow-lg:0 28px 80px rgba(30,24,13,.16);
      --radius:22px;
      --sidebar:286px;
      --topbar:76px;
      --font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;background:var(--paper);overflow-x:hidden}
    body{margin:0;min-width:320px;max-width:100%;overflow-x:hidden;background:var(--paper);color:var(--ink);font-family:var(--font);line-height:1.45;-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    img,svg{display:block;max-width:100%}
    a{color:inherit;text-decoration:none}
    [hidden]{display:none!important}
    .app{display:flex;min-height:100dvh;max-width:100%}
    .sidebar{position:sticky;top:0;z-index:50;flex:0 0 var(--sidebar);width:var(--sidebar);height:100dvh;display:flex;flex-direction:column;padding:12px;background:#fff;border-right:1px solid var(--line);transition:width .28s ease,transform .28s ease}
    .sidebar.collapsed{width:88px;flex-basis:88px}
    .brand{height:70px;display:flex;align-items:center;gap:12px;padding:8px}
    .brand-logo{width:48px;height:48px;flex:0 0 48px;border-radius:16px;object-fit:cover;box-shadow:0 12px 28px rgba(229,34,30,.16)}
    .brand-text{min-width:0;overflow:hidden;white-space:nowrap}
    .brand-text strong{display:block;font-size:14px;font-weight:950;letter-spacing:-.02em}
    .brand-text span{display:block;margin-top:2px;color:#9b978f;font-size:11px;font-weight:650}
    .sidebar.collapsed .brand-text,.sidebar.collapsed .nav-copy,.sidebar.collapsed .admin-copy,.sidebar.collapsed .collapse-copy{display:none}
    .sidebar.collapsed .brand,.sidebar.collapsed .nav-btn,.sidebar.collapsed .admin-card,.sidebar.collapsed .collapse-btn{justify-content:center}
    .nav{flex:1;margin-top:10px;padding:0 4px 14px;overflow-y:auto;overscroll-behavior:contain}
    .nav-btn{width:100%;min-height:54px;display:flex;align-items:center;gap:12px;margin:4px 0;padding:9px 11px;color:#615d56;background:transparent;border:0;border-radius:17px;text-align:left;transition:.2s ease}
    .nav-btn:hover{color:var(--ink);background:#f5f4ef}
    .nav-btn.active{color:var(--ink);background:linear-gradient(135deg,var(--yellow),var(--yellow-2));box-shadow:0 16px 36px -22px rgba(152,100,0,.75)}
    .nav-icon{width:36px;height:36px;flex:0 0 36px;display:grid;place-items:center;border-radius:12px;background:#f4f3ef;color:#807b71}
    .nav-btn.active .nav-icon{background:rgba(255,255,255,.48);color:var(--ink)}
    .nav-copy{min-width:0}
    .nav-copy b{display:block;font-size:13px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-copy small{display:block;margin-top:2px;color:#a09c94;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-btn.active .nav-copy small{color:rgba(21,18,14,.62)}
    .sidebar-foot{padding:12px 4px 2px;border-top:1px solid var(--line)}
    .admin-card{display:flex;align-items:center;gap:11px;padding:11px;color:white;background:linear-gradient(145deg,#17140f,#2a241c);border-radius:17px}
    .admin-avatar{width:38px;height:38px;flex:0 0 38px;display:grid;place-items:center;border-radius:12px;background:rgba(245,199,46,.18);color:var(--yellow);font-size:12px;font-weight:950}
    .admin-copy{min-width:0}
    .admin-copy b,.admin-copy span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .admin-copy b{font-size:12px}.admin-copy span{margin-top:2px;color:#aaa49a;font-size:10px}
    .collapse-btn{width:100%;height:40px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;color:#7d786f;background:transparent;border:0;border-radius:12px;font-size:11px;font-weight:750}
    .collapse-btn:hover{background:#f4f3ef;color:var(--ink)}
    .main-shell{min-width:0;flex:1;max-width:100%}
    .topbar{position:sticky;top:0;z-index:35;height:var(--topbar);display:flex;align-items:center;padding:12px 24px;background:rgba(255,255,255,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(18px)}
    .topbar-inner{width:100%;max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:12px;min-width:0}
    .icon-btn{position:relative;width:44px;height:44px;flex:0 0 44px;display:grid;place-items:center;color:#625e57;background:#fff;border:1px solid #deddd8;border-radius:14px;transition:.2s ease}
    .icon-btn:hover{border-color:#d3a911;color:var(--ink);transform:translateY(-1px)}
    .menu-btn{display:none}
    .top-title{min-width:0}
    .top-title h1{margin:0;font-size:19px;line-height:1.1;font-weight:950;letter-spacing:-.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-title p{margin:4px 0 0;color:#9a968e;font-size:11px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-search{margin-left:auto;width:min(390px,34vw);height:44px;display:flex;align-items:center;gap:10px;padding:0 13px;color:#aaa69d;background:#f7f7f4;border:1px solid #e6e4df;border-radius:14px;text-align:left}
    .top-search:hover{background:#fff;border-color:#d9b323}
    .top-search span{flex:1;font-size:12px}.top-search kbd{padding:4px 7px;background:#fff;border:1px solid #deddd8;border-radius:7px;color:#aaa69d;font-size:9px;font-weight:800}
    .badge-dot{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;padding:0 5px;display:grid;place-items:center;color:#fff;background:var(--red);border:2px solid #fff;border-radius:999px;font-size:9px;font-weight:950}
    .btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 17px;border:1px solid transparent;border-radius:14px;font-size:12px;font-weight:850;white-space:nowrap;transition:.2s ease}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{color:var(--ink);background:var(--yellow);box-shadow:0 12px 28px -18px rgba(137,94,0,.8)}
    .btn-primary:hover{background:var(--yellow-2)}
    .btn-dark{color:#fff;background:var(--ink)}
    .btn-red{color:#fff;background:var(--red)}
    .btn-outline{color:#5f5a53;background:#fff;border-color:#deddd8}
    .btn-soft{color:#5c574f;background:#f4f3ef}
    .btn-sm{min-height:36px;padding:0 12px;border-radius:11px;font-size:11px}
    .content{width:100%;max-width:1600px;margin:0 auto;padding:26px 28px 44px}
    .view{display:none;animation:fadeIn .22s ease}.view.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
    .view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:24px}
    .eyebrow{display:flex;align-items:center;gap:8px;margin:0 0 8px;color:var(--red);font-size:10px;font-weight:950;letter-spacing:.14em;text-transform:uppercase}.eyebrow:before{content:"";width:26px;height:3px;background:var(--yellow);border-radius:99px}
    .view-head h2{margin:0;font-size:clamp(26px,3vw,42px);line-height:1.03;font-weight:950;letter-spacing:-.055em}
    .view-head p{max-width:700px;margin:10px 0 0;color:var(--muted);font-size:13px}
    .view-actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
    .demo-banner{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px;padding:14px 16px;background:linear-gradient(135deg,#fff7db,#fffdf3);border:1px solid #f0d878;border-radius:18px;color:#75500a}
    .demo-banner strong{display:block;font-size:12px}.demo-banner span{display:block;margin-top:3px;font-size:11px;color:#96772f}
    .metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:15px}
    .metric{position:relative;overflow:hidden;padding:19px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .metric:after{content:"";position:absolute;width:82px;height:82px;right:-25px;top:-24px;border:18px solid currentColor;border-radius:50%;opacity:.045}
    .metric-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .metric-label{color:#827e76;font-size:11px;font-weight:800}.metric-icon{width:42px;height:42px;display:grid;place-items:center;border-radius:14px}
    .tone-green .metric-icon{color:var(--green);background:var(--green-soft)}.tone-red .metric-icon{color:var(--red);background:#fff0ef}.tone-yellow .metric-icon{color:#8e6200;background:#fff6d3}.tone-violet .metric-icon{color:var(--violet);background:var(--violet-soft)}.tone-blue .metric-icon{color:var(--blue);background:var(--blue-soft)}
    .metric-value{margin-top:15px;font-size:clamp(23px,2.5vw,32px);line-height:1;font-weight:950;letter-spacing:-.045em}.metric-helper{margin-top:8px;color:#a19d95;font-size:10px;font-weight:650}

  function metrics(from,to,branchId='all'){

    <article class="card"><div class="card-head"><div><h3>Финансовая динамика</h3><p>Поступления и затраты по дням выбранного периода</p></div></div><div class="card-body"><div class="chart-wrap">${days.map(d=>{const x=metrics(d,d),ex=x.cogs+x.ops;return `<div class="chart-col"><div class="chart-bars"><div class="bar bar-income" title="${fmtMoney(x.revenue)}" style="height:${Math.max(x.revenue/chartMax*100,x.revenue?3:1)}%"></div><div class="bar bar-expense" title="${fmtMoney(ex)}" style="height:${Math.max(ex/chartMax*100,ex?3:1)}%"></div></div><span class="chart-label">${fmtDate(d).slice(0,5)}</span></div>`}).join('')}</div><div class="chart-legend"><span><i class="legend-dot" style="background:var(--yellow)"></i>Поступления</span><span><i class="legend-dot" style="background:var(--red)"></i>Затраты</span></div></div></article>

    <div class="grid-half"><article class="card"><div class="card-head"><div><h3>Популярные товары</h3><p>Количество и выручка по позициям</p></div></div><div class="card-body"><div class="rank-list">${productSorted.length?productSorted.map(([name,x])=>`<div class="rank-row"><div class="rank-main"><div class="rank-title"><span>${esc(name)}</span><span>${x.qty} шт.</span></div><div class="rank-sub">Выручка ${fmtMoney(x.revenue)} · себестоимость ${fmtMoney(x.cost)}</div><div class="rank-bar"><span style="width:${x.revenue/maxProd*100}%"></span></div></div><strong>${fmtMoney(x.revenue-x.cost)}</strong></div>`).join(''):emptyBlock('Нет данных','В выбранном периоде продаж нет.')}</div></div></article><article class="card"><div class="card-head"><div><h3>Показатели эффективности</h3><p>Ключевые коэффициенты выбранного периода</p></div></div><div class="card-body"><div class="branch-stat-grid"><div class="branch-stat"><span>Средний чек</span><strong>${fmtMoney(m.avg)}</strong></div><div class="branch-stat"><span>Продано позиций</span><strong>${m.items}</strong></div><div class="branch-stat"><span>Маржа до прочих расходов</span><strong>${m.revenue?Math.round((m.revenue-m.cogs)/m.revenue*100):0}%</strong></div><div class="branch-stat"><span>Чистая рентабельность</span><strong class="${m.profit>=0?'positive':'negative'}">${m.revenue?Math.round(m.profit/m.revenue*100):0}%</strong></div><div class="branch-stat"><span>Оплачено заказов</span><strong>${m.active.filter(o=>orderStatus(o)==='paid').length}</strong></div><div class="branch-stat"><span>Доля долгов</span><strong class="${m.debt?'warning':''}">${m.sales?Math.round(m.debt/m.sales*100):0}%</strong></div></div></div></article></div>`;

  function exportFinanceCsv(){const {from,to}=financeRange;const rows=[['Тип','Дата','Филиал','Описание','Начислено','Оплачено','Себестоимость','Расход']];state.orders.filter(o=>inRange(o.date,from,to)).forEach(o=>rows.push(['Продажа',o.date,branchName(o.branchId),o.items.map(i=>`${i.name} x${i.qty}`).join('; '),orderTotal(o),orderPaid(o),orderCost(o),0]));state.expenses.filter(e=>inRange(e.date,from,to)).forEach(e=>rows.push(['Расход',e.date,e.branchId==='company'?'Общие':branchName(e.branchId),`${categoryName(e.category)}: ${e.description}`,0,0,0,e.amount]));const csv='\ufeff'+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(';')).join('\n');download(`GRILL_BISHKEK_finance_${from}_${to}.csv`,csv,'text/csv;charset=utf-8')}

  function renderSettings(){q('[data-view="settings"]').innerHTML=`${viewHead('Настройки','Товары, себестоимость и данные','Укажите реальные цены и себестоимость — после этого прибыль будет рассчитываться корректно.',`<button class="btn btn-primary" id="addProduct">${icon('plus')} Добавить товар</button>`)}<div class="settings-grid"><article class="card"><div class="card-head"><div><h3>Каталог товаров</h3><p>Цена продажи и себестоимость автоматически подставляются в новый заказ</p></div></div><div class="card-body"><div class="note-box" style="margin-bottom:14px"><strong>Важно:</strong> себестоимость — это закупочная стоимость одной позиции. Если она равна нулю, отчёт о прибыли будет завышен.</div><div class="catalog-list" id="catalogList">${state.products.map(p=>`<div class="catalog-row" data-product-row="${p.id}"><div class="catalog-name"><b>${esc(p.name)}</b><span>${esc(p.category)} · ${p.active?'активен':'скрыт'}</span></div><input type="number" min="0" step="1" value="${p.price}" data-product-price="${p.id}" aria-label="Цена ${esc(p.name)}"><input type="number" min="0" step="1" value="${p.cost}" data-product-cost="${p.id}" aria-label="Себестоимость ${esc(p.name)}"><button class="action-btn danger" data-delete-product="${p.id}" title="Удалить товар">${icon('trash')}</button></div>`).join('')}</div><div style="display:grid;grid-template-columns:1fr 1fr auto;gap:9px;margin-top:12px;color:#99958e;font-size:8px;font-weight:800;text-transform:uppercase"><span>Название</span><span style="text-align:right">Цена / себестоимость</span><span></span></div></div></article><div><article class="card settings-section"><div class="card-head"><div><h3>Резервная копия</h3><p>Перенос данных между устройствами</p></div></div><div class="card-body"><div class="note-box">Данные хранятся только в этом браузере. Перед сменой телефона или компьютера скачайте резервную копию.</div><div style="display:grid;gap:9px;margin-top:13px"><button class="btn btn-dark" id="exportBackup">${icon('dow   function saleLineHtml(line={productId:state.products[0]?.id||'',qty:1,unitPrice:0,unitCost:0}){const p=state.products.find(x=>x.id===line.productId);const price=line.unitPrice||p?.price||0,cost=line.unitCost||p?.cost||0;return `<div class="order-line"><div class="field"><label>Товар</label><select name="productId" class="line-product">${productOptions(line.productId)}</select></div><div class="field"><label>Кол-во</label><input name="qty" class="line-qty" type="number" min="1" step="1" value="${line.qty||1}"></div><div class="field"><label>Цена</label><input name="price" class="line-price" type="number" min="0" step="1" value="${price}"></div><div class="field cost-field"><label>Себест.</label><input name="cost" class="line-cost" type="number" min="0" step="1" value="${cost}"></div><button class="action-btn danger remove-line" type="button">${icon('trash')}</button><div class="line-total">Итого: ${fmtMoney((line.qty||1)*price)}</div></div>`}
  function openSaleModal(id=null){const existing=id?state.orders.find(o=>o.id===id):null;const o=existing?JSON.parse(JSON.stringify(existing)):{date:localDate(),time:new Date().toTimeString().slice(0,5),branchId:state.branches[0].id,customer:'',phone:'',paymentMethod:'cash',paidAmount:'',status:'completed',note:'',items:[{productId:'chicken',qty:1,unitPrice:549,unitCost:state.products.find(p=>p.id==='chicken')?.cost||0}]};const root=modal({title:existing?'Редактировать продажу':'Добавить продажу',subtitle:'Укажите филиал и все купленные позиции: курицу, соусы, лаваш и напитки.',wide:true,body:`<div class="form-grid"><div class="field"><label>Дата</label><input name="date" type="date" value="${o.date}" required></div><div class="field"><label>Время</label><input name="time" type="time" value="${o.time}" required></div><div class="field"><label>Филиал</label><select name="branchId">${state.branches.map(b=>`<option value="${b.id}" ${b.id===o.branchId?'selected':''}>${esc(b.name)} — ${esc(b.address)}</option>`).join('')}</select></div><div class="field"><label>Способ оплаты</label><select name="paymentMethod"><option value="cash" ${o.paymentMethod==='cash'?'selected':''}>Наличные</option><option value="card" ${o.paymentMethod==='card'?'selected':''}>Карта</option><option value="transfer" ${o.paymentMethod==='transfer'?'selected':''}>Перевод</option></select></div><div class="field"><label>Имя клиента</label><input name="customer" value="${esc(o.customer)}" placeholder="Можно оставить пустым"></div><div class="field"><label>Телефон</label><input name="phone" value="${esc(o.phone)}" placeholder="Необязательно"></div></div><div class="order-items"><div class="order-items-head"><b>Что купили</b><button class="btn btn-soft btn-sm" id="addLine" type="button">${icon('plus')} Добавить позицию</button></div><div id="orderLines">${o.items.map(saleLineHtml).join('')}</div></div><div class="form-grid" style="margin-top:14px"><div class="field"><label>Оплачено клиентом</label><input name="paidAmount" id="paidAmount" type="number" min="0" step="1" value="${o.paidAmount}" placeholder="Сумма фактической оплаты"></div><div class="field"><label>Статус заказа</label><select name="status"><option value="completed" ${o.status!=='cancelled'?'selected':''}>Действующий заказ</option><option value="cancelled" ${o.status==='cancelled'?'selected':''}>Отменён</option></select></div><div class="field full"><label>Примечание</label><textarea name="note" placeholder="Например: доставка, термоупаковка, остаток оплаты позже">${esc(o.note)}</textarea></div></div><div class="order-total-box"><div><span>Сумма заказа</span><strong id="modalOrderTotal">0 сом</strong></div><div><span>Себестоимость</span><strong id="modalOrderCost">0 сом</strong></div><div><span>Ожидаемая маржа</span><strong id="modalOrderMargin">0 сом</strong></div></div>`,onSubmit:(fd,form)=>{const lines=qa('.order-line',form).map(r=>{const productId=q('.line-product',r).value,p=state.products.find(x=>x.id===productId);return {productId,name:p?.name||'Товар',qty:Math.max(1,Number(q('.line-qty',r).value)||1),unitPrice:Math.max(0,Number(q('.line-price',r).value)||0),unitCost:Math.max(0,Number(q('.line-cost',r).value)||0)}});if(!lines.length){toast('Добавьте хотя бы одну позицию','error');return}const total=sum(lines,i=>i.qty*i.unitPrice);const record={id:existing?.id||uid(),date:fd.get('date'),time:fd.get('time'),branchId:fd.get('branchId'),customer:String(fd.get('customer')||'').trim(),phone:String(fd.get('phone')||'').trim(),paymentMethod:fd.get('paymentMethod'),paidAmount:Math.max(0,Math.min(Number(fd.get('paidAmount'))||0,total)),status:fd.get('status'),note:String(fd.get('note')||'').trim(),items:lines};if(existing)state.orders=state.orders.map(x=>x.id===existing.id?record:x);else state.orders.push(record);state.meta.demo=false;save();closeModal();renderActive();toast(existing?'Продажа обновлена':'Продажа добавлена')},submitText:existing?'Сохранить изменения':'Добавить продажу'});
    const lines=q('#orderLines',root),recalc=()=>{let total=0,cost=0;qa('.order-line',lines).forEach(r=>{const qty=Math.max(1,Number(q('.line-qty',r).value)||1),price=Math.max(0,Number(q('.line-price',r).value)||0),c=Math.max(0,Number(q('.line-cost',r).value)||0);total+=qty*price;cost+=qty*c;q('.line-total',r).textContent=`Итого: ${fmtMoney(qty*price)}`});q('#modalOrderTotal').textContent=fmtMoney(total);q('#modalOrderCost').textContent=fmtMoney(cost);q('#modalOrderMargin').textContent=fmtMoney(total-cost);if(!q('#paidAmount').value)q('#paidAmount').value=total};const bindLine=r=>{q('.line-product',r).onchange=e=>{const p=state.products.find(x=>x.id===e.target.value);q('.line-price',r).value=p?.price||0;q('.line-cost',r).value=p?.cost||0;recalc()};qa('input',r).forEach(i=>i.oninput=recalc);q('.remove-line',r).onclick=()=>{if(qa('.order-line',lines).length<=1){toast('В заказе должна остаться хотя бы одна позиция','error');return}r.remove();recalc()}};qa('.order-line',lines).forEach(bindLine);q('#addLine').onclick=()=>{const t=document.createElement('div');t.innerHTML=saleLineHtml();const r=t.firstElementChild;lines.appendChild(r);bindLine(r);recalc()};recalc();
  }
  function openExpenseModal(id=null){const e=id?state.expenses.find(x=>x.id===id):{date:localDate(),branchId:state.branches[0].id,category:'ingredients',description:'',amount:'',paymentMethod:'cash'};modal({title:id?'Редактировать расход':'Добавить расход',subtitle:'Расход сразу попадёт в отчёт выбранного филиала.',body:`<div class="form-grid"><div class="field"><label>Дата</label><input name="date" type="date" value="${e.date}" required></div><div class="field"><label>Филиал</label><select name="branchId"><option value="company" ${e.branchId==='company'?'selected':''}>Общие расходы компании</option>${state.branches.map(b=>`<option value="${b.id}" ${e.branchId===b.id?'selected':''}>${esc(b.name)}</option>`).join('')}</select></div><div class="field"><label>Категория</label><select name="category">${['salary','ingredients','rent','utilities','transport','repair','purchase','tax','marketing','other'].map(c=>`<option value="${c}" ${e.category===c?'selected':''}>${categoryName(c)}</option>`).join('')}</select></div><div class="field"><label>Способ оплаты</label><select name="paymentMethod"><option value="cash" ${e.paymentMethod==='cash'?'selected':''}>Наличные</option><option value="card" ${e.paymentMethod==='card'?'selected':''}>Карта</option><option value="transfer" ${e.paymentMethod==='transfer'?'selected':''}>Перевод</option></select></div><div class="field full"><label>Описание</label><input name="description" value="${esc(e.description)}" placeholder="Например: зарплата повару за июль" required></div><div class="field full"><label>Сумма расхода</label><input name="amount" type="number" min="1" step="1" value="${e.amount}" required></div></div>`,onSubmit:fd=>{const record={id:e.id||uid(),date:fd.get('date'),branchId:fd.get('branchId'),category:fd.get('category'),description:String(fd.get('description')).trim(),amount:Math.max(0,Number(fd.get('amount'))||0),paymentMethod:fd.get('paymentMethod')};if(id)state.expenses=state.expenses.map(x=>x.id===id?record:x);else state.expenses.push(record);state.meta.demo=false;save();closeModal();renderActive();toast(id?'Расход обновлён':'Расход добавлен')},submitText:id?'Сохранить изменения':'Добавить расход'})}
  function openProductModal(){modal({title:'Добавить товар',subtitle:'Новая позиция станет доступна при добавлении продажи.',body:`<div class="form-grid"><div class="field full"><label>Название товара</label><input name="name" required placeholder="Например: Айран 1 л"></div><div class="field"><label>Категория</label><input name="category" value="Дополнительно" required></div><div class="field"><label>Цена продажи</label><input name="price" type="number" min="0" step="1" required></div><div class="field full"><label>Себестоимость</label><input name="cost" type="number" min="0" step="1" required><div class="field-help">Закупочная стоимость одной единицы.</div></div></div>`,onSubmit:fd=>{state.products.push({id:uid(),name:String(fd.get('name')).trim(),category:String(fd.get('category')).trim(),price:Math.max(0,Number(fd.get('price'))||0),cost:Math.max(0,Number(fd.get('cost'))||0),active:true});state.meta.demo=false;save();closeModal();renderSettings();toast('Товар добавлен')},submitText:'Добавить товар'})}

  function renderAlerts(){const alerts=getAlerts(),panel=q('#notificationPanel'),badge=q('#notificationBadge');badge.hidden=!alerts.length;badge.textContent=alerts.length>9?'9+':alerts.length;panel.innerHTML=`<div class="panel-title"><b>Уведомления</b><button class="action-btn" id="closeAlerts">${icon('close')}</button></div>${alerts.length?alerts.map(a=>`<button class="alert-item" data-alert-view="${a.view}" type="button" style="width:100%;border:0;background:transparent;text-align:left"><span class="alert-icon">!</span><span class="alert-copy"><b>${esc(a.title)}</b><span>${esc(a.text)}</span></span></button>`).join(''):`<div class="alert-empty">Всё в порядке — новых уведомлений нет.</div>`}`;q('#closeAlerts').onclick=()=>panel.classList.remove('open');qa('[data-alert-view]').forEach(b=>b.onclick=()=>{panel.classList.remove('open');navigate(b.dataset.alertView)})}
  function openSearch(){modal({title:'Быстрый поиск',subtitle:'Ищите продажи, расходы, товары и филиалы.',body:`<label class="search-input" style="width:100%;height:48px">${icon('search')}<input id="globalSearch" placeholder="Начните вводить название, клиента или сумму" autocomplete="off"></label><div class="search-modal-results" id="searchResults"></div>`});const input=q('#globalSearch'),host=q('#searchResults');const run=()=>{const v=input.value.trim().toLowerCase();if(!v){host.innerHTML='<div class="alert-empty">Введите минимум два символа.</div>';return}const res=[];state.orders.filter(o=>[o.customer,o.phone,o.note,branchName(o.branchId),...o.items.map(i=>i.name)].join(' ').toLowerCase().includes(v)).slice(0,5).forEach(o=>res.push({view:'sales',icon:'receipt',title:o.items.map(i=>i.name).join(', '),text:`${fmtDate(o.date)} · ${branchName(o.branchId)} · ${fmtMoney(orderTotal(o))}`}));state.expenses.filter(e=>[e.description,categoryName(e.category),branchName(e.branchId)].join(' ').toLowerCase().includes(v)).slice(0,5).forEach(e=>res.push({view:'expenses',icon:'wallet',title:e.description,text:`${fmtDate(e.date)} · ${fmtMoney(e.amount)}`}));state.products.filter(p=>p.name.toLowerCase().includes(v)).slice(0,5).forEach(p=>res.push({view:'settings',icon:'cart',title:p.name,text:`Цена ${fmtMoney(p.price)} · себестоимость ${fmtMoney(p.cost)}`}));host.innerHTML=res.length?res.map(r=>`<button class="search-result" data-search-view="${r.view}" type="button"><span class="search-result-icon">${icon(r.icon)}</span><span><b>${esc(r.title)}</b><span>${esc(r.text)}</span></span></button>`).join(''):'<div class="alert-empty">Ничего не найдено.</div>';qa('[data-search-view]',host).forEach(b=>b.onclick=()=>{closeModal();navigate(b.dataset.searchView)})};input.oninput=run;setTimeout(()=>input.focus(),50)}

  function bindCommon(root=document){qa('[data-add-sale]',root).forEach(b=>b.onclick=()=>openSaleModal());qa('[data-add-expense]',root).forEach(b=>b.onclick=()=>openExpenseModal());qa('[data-go]',root).forEach(b=>b.onclick=()=>navigate(b.dataset.go))}
  function openMobile(){q('#sidebar').classList.add('mobile-open');q('#drawerBackdrop').classList.add('open');document.body.style.overflow='hidden'}
  function closeMobile(){q('#sidebar').classList.remove('mobile-open');q('#drawerBackdrop').classList.remove('open');document.body.style.overflow=''}
  function init(){
    q('#menuBtn').innerHTML=icon('menu');q('#mobileSearchBtn').innerHTML=icon('search');q('#notificationBtn').innerHTML=icon('bell');q('#addSaleTop').innerHTML=`${icon('plus')} Добавить`;q('#mobileFab').innerHTML=icon('plus');q('#collapseIcon').innerHTML=icon('chevron');
    q('#menuBtn').onclick=openMobile;q('#drawerBackdrop').onclick=closeMobile;q('#collapseBtn').onclick=()=>q('#sidebar').classList.toggle('collapsed');q('#searchBtn').onclick=openSearch;q('#mobileSearchBtn').onclick=openSearch;q('#notificationBtn').onclick=e=>{e.stopPropagation();q('#notificationPanel').classList.toggle('open')};q('#addSaleTop').onclick=()=>openSaleModal();q('#mobileFab').onclick=()=>openSaleModal();document.addEventListener('click',e=>{if(!q('#notificationPanel').contains(e.target)&&!q('#notificationBtn').contains(e.target))q('#notificationPanel').classList.remove('open')});document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openSearch()}if(e.key==='Escape'){closeModal();closeMobile();q('#notificationPanel').classList.remove('open')}});
    q('#clearDemoBtn').onclick=()=>confirmDialog('Очистить демо-данные?','Продажи и расходы будут удалены. Цены товаров сохранятся, а себестоимость станет нулевой для ручной настройки.',()=>{state=blankState();save();renderActive();toast('Демо-данные очищены')});
    q('#importInput').onchange=async e=>{const file=e.target.files?.[0];if(!file)return;try{const data=JSON.parse(await file.text());if(!Array.isArray(data.orders)||!Array.isArray(data.expenses)||!Array.isArray(data.products)||!Array.isArray(data.branches))throw new Error();state=data;state.meta={...(state.meta||{}),demo:false};save();renderActive();toast('Резервная копия загружена')}catch{toast('Файл резервной копии повреждён','error')}e.target.value=''};
    renderNav();renderActive();
  }
  init();
  </script>
</body>
