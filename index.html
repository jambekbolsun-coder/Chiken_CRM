  <style>
    :root {
      --yellow:#f5c72e;
      --yellow-2:#ffdc58;
      --red:#e5221e;
      --red-dark:#b91310;
      --ink:#15120e;
      --ink-2:#27221c;
      --paper:#f5f6f2;
      --card:#ffffff;
      --muted:#72706a;
      --line:#e8e7e1;
      --green:#138a55;
      --green-soft:#e8f7ef;
      --blue:#2563eb;
      --blue-soft:#eaf1ff;
      --amber:#b66b00;
      --amber-soft:#fff4dc;
      --violet:#7c3aed;
      --violet-soft:#f2eaff;
      --shadow:0 18px 50px rgba(30,24,13,.08);
      --shadow-lg:0 28px 80px rgba(30,24,13,.16);
      --radius:22px;
      --sidebar:286px;
      --topbar:76px;
      --font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;background:var(--paper);overflow-x:hidden}
    body{margin:0;min-width:320px;max-width:100%;overflow-x:hidden;background:var(--paper);color:var(--ink);font-family:var(--font);line-height:1.45;-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    img,svg{display:block;max-width:100%}
    a{color:inherit;text-decoration:none}
    [hidden]{display:none!important}
    .app{display:flex;min-height:100dvh;max-width:100%}
    .sidebar{position:sticky;top:0;z-index:50;flex:0 0 var(--sidebar);width:var(--sidebar);height:100dvh;display:flex;flex-direction:column;padding:12px;background:#fff;border-right:1px solid var(--line);transition:width .28s ease,transform .28s ease}
    .sidebar.collapsed{width:88px;flex-basis:88px}
    .brand{height:70px;display:flex;align-items:center;gap:12px;padding:8px}
    .brand-logo{width:48px;height:48px;flex:0 0 48px;border-radius:16px;object-fit:cover;box-shadow:0 12px 28px rgba(229,34,30,.16)}
    .brand-text{min-width:0;overflow:hidden;white-space:nowrap}
    .brand-text strong{display:block;font-size:14px;font-weight:950;letter-spacing:-.02em}
    .brand-text span{display:block;margin-top:2px;color:#9b978f;font-size:11px;font-weight:650}
    .sidebar.collapsed .brand-text,.sidebar.collapsed .nav-copy,.sidebar.collapsed .admin-copy,.sidebar.collapsed .collapse-copy{display:none}
    .sidebar.collapsed .brand,.sidebar.collapsed .nav-btn,.sidebar.collapsed .admin-card,.sidebar.collapsed .collapse-btn{justify-content:center}
    .nav{flex:1;margin-top:10px;padding:0 4px 14px;overflow-y:auto;overscroll-behavior:contain}
    .nav-btn{width:100%;min-height:54px;display:flex;align-items:center;gap:12px;margin:4px 0;padding:9px 11px;color:#615d56;background:transparent;border:0;border-radius:17px;text-align:left;transition:.2s ease}
    .nav-btn:hover{color:var(--ink);background:#f5f4ef}
    .nav-btn.active{color:var(--ink);background:linear-gradient(135deg,var(--yellow),var(--yellow-2));box-shadow:0 16px 36px -22px rgba(152,100,0,.75)}
    .nav-icon{width:36px;height:36px;flex:0 0 36px;display:grid;place-items:center;border-radius:12px;background:#f4f3ef;color:#807b71}
    .nav-btn.active .nav-icon{background:rgba(255,255,255,.48);color:var(--ink)}
    .nav-copy{min-width:0}
    .nav-copy b{display:block;font-size:13px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-copy small{display:block;margin-top:2px;color:#a09c94;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-btn.active .nav-copy small{color:rgba(21,18,14,.62)}
    .sidebar-foot{padding:12px 4px 2px;border-top:1px solid var(--line)}
    .admin-card{display:flex;align-items:center;gap:11px;padding:11px;color:white;background:linear-gradient(145deg,#17140f,#2a241c);border-radius:17px}
    .admin-avatar{width:38px;height:38px;flex:0 0 38px;display:grid;place-items:center;border-radius:12px;background:rgba(245,199,46,.18);color:var(--yellow);font-size:12px;font-weight:950}
    .admin-copy{min-width:0}
    .admin-copy b,.admin-copy span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .admin-copy b{font-size:12px}.admin-copy span{margin-top:2px;color:#aaa49a;font-size:10px}
    .collapse-btn{width:100%;height:40px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;color:#7d786f;background:transparent;border:0;border-radius:12px;font-size:11px;font-weight:750}
    .collapse-btn:hover{background:#f4f3ef;color:var(--ink)}
    .main-shell{min-width:0;flex:1;max-width:100%}
    .topbar{position:sticky;top:0;z-index:35;height:var(--topbar);display:flex;align-items:center;padding:12px 24px;background:rgba(255,255,255,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(18px)}
    .topbar-inner{width:100%;max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:12px;min-width:0}
    .icon-btn{position:relative;width:44px;height:44px;flex:0 0 44px;display:grid;place-items:center;color:#625e57;background:#fff;border:1px solid #deddd8;border-radius:14px;transition:.2s ease}
    .icon-btn:hover{border-color:#d3a911;color:var(--ink);transform:translateY(-1px)}
    .menu-btn{display:none}
    .top-title{min-width:0}
    .top-title h1{margin:0;font-size:19px;line-height:1.1;font-weight:950;letter-spacing:-.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-title p{margin:4px 0 0;color:#9a968e;font-size:11px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-search{margin-left:auto;width:min(390px,34vw);height:44px;display:flex;align-items:center;gap:10px;padding:0 13px;color:#aaa69d;background:#f7f7f4;border:1px solid #e6e4df;border-radius:14px;text-align:left}
    .top-search:hover{background:#fff;border-color:#d9b323}
    .top-search span{flex:1;font-size:12px}.top-search kbd{padding:4px 7px;background:#fff;border:1px solid #deddd8;border-radius:7px;color:#aaa69d;font-size:9px;font-weight:800}
    .badge-dot{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;padding:0 5px;display:grid;place-items:center;color:#fff;background:var(--red);border:2px solid #fff;border-radius:999px;font-size:9px;font-weight:950}
    .btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 17px;border:1px solid transparent;border-radius:14px;font-size:12px;font-weight:850;white-space:nowrap;transition:.2s ease}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{color:var(--ink);background:var(--yellow);box-shadow:0 12px 28px -18px rgba(137,94,0,.8)}
    .btn-primary:hover{background:var(--yellow-2)}
    .btn-dark{color:#fff;background:var(--ink)}
    .btn-red{color:#fff;background:var(--red)}
    .btn-outline{color:#5f5a53;background:#fff;border-color:#deddd8}
    .btn-soft{color:#5c574f;background:#f4f3ef}
    .btn-sm{min-height:36px;padding:0 12px;border-radius:11px;font-size:11px}
    .content{width:100%;max-width:1600px;margin:0 auto;padding:26px 28px 44px}
    .view{display:none;animation:fadeIn .22s ease}.view.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
    .view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:24px}
    .eyebrow{display:flex;align-items:center;gap:8px;margin:0 0 8px;color:var(--red);font-size:10px;font-weight:950;letter-spacing:.14em;text-transform:uppercase}.eyebrow:before{content:"";width:26px;height:3px;background:var(--yellow);border-radius:99px}
    .view-head h2{margin:0;font-size:clamp(26px,3vw,42px);line-height:1.03;font-weight:950;letter-spacing:-.055em}
    .view-head p{max-width:700px;margin:10px 0 0;color:var(--muted);font-size:13px}
    .view-actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
    .demo-banner{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px;padding:14px 16px;background:linear-gradient(135deg,#fff7db,#fffdf3);border:1px solid #f0d878;border-radius:18px;color:#75500a}
    .demo-banner strong{display:block;font-size:12px}.demo-banner span{display:block;margin-top:3px;font-size:11px;color:#96772f}
    .metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:15px}
    .metric{position:relative;overflow:hidden;padding:19px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .metric:after{content:"";position:absolute;width:82px;height:82px;right:-25px;top:-24px;border:18px solid currentColor;border-radius:50%;opacity:.045}
    .metric-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .metric-label{color:#827e76;font-size:11px;font-weight:800}.metric-icon{width:42px;height:42px;display:grid;place-items:center;border-radius:14px}
    .tone-green .metric-icon{color:var(--green);background:var(--green-soft)}.tone-red .metric-icon{color:var(--red);background:#fff0ef}.tone-yellow .metric-icon{color:#8e6200;background:#fff6d3}.tone-violet .metric-icon{color:var(--violet);background:var(--violet-soft)}.tone-blue .metric-icon{color:var(--blue);background:var(--blue-soft)}
    .metric-value{margin-top:15px;font-size:clamp(23px,2.5vw,32px);line-height:1;font-weight:950;letter-spacing:-.045em}.metric-helper{margin-top:8px;color:#a19d95;font-size:10px;font-weight:650}

  <button class="mobile-fab" id="mobileFab" type="button" aria-label="Добавить прибыль"></button>
  <div class="notification-panel" id="notificationPanel"></div>
  <div class="modal-backdrop" id="modalRoot" aria-hidden="true"></div>
  <div class="toast-wrap" id="toastWrap"></div>
  <input type="file" id="importInput" accept="application/json" hidden>

  <script>
  'use strict';
  const STORAGE_KEY='grill_bishkek_crm_simple_v2';
  const CURRENCY='сом';
  const NAV=[
    {id:'dashboard',label:'Главная',desc:'Ключевые показатели',icon:'dashboard'},
    {id:'sales',label:'Прибыль',desc:'Поступления по филиалам',icon:'income'},
    {id:'expenses',label:'Расходы',desc:'Расходы по филиалам',icon:'wallet'},
    {id:'finance',label:'Финансовый отчёт',desc:'Итог по филиалам',icon:'chart'},
    {id:'branches',label:'Филиалы',desc:'Сравнение трёх точек',icon:'branch'},
    {id:'settings',label:'Настройки',desc:'Компания и резервные копии',icon:'settings'}
  ];
  const ICONS={
    dashboard:'<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>',
    cart:'<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="20" r="1"/><circle cx="19" cy="20" r="1"/><path d="M3 4h2l2.6 11.1a2 2 0 0 0 2 1.5h7.8a2 2 0 0 0 2-1.6L21 8H6"/></svg>',
    wallet:'<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a3 3 0 0 1 3-3h13a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a3 3 0 0 1-3-3z"/><path d="M16 12h5"/><circle cx="16" cy="12" r="1"/></svg>',
    chart:'<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9"/><path d="M10 19V5"/><path d="M16 19v-7"/><path d="M22 19V3"/><path d="M2 19h22"/></svg>',
    branch:'<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="5" r="2"/><circle cx="18" cy="5" r="2"/><circle cx="12" cy="19" r="2"/><path d="M6 7v3c0 2 2 3 4 3h2"/><path d="M18 7v3c0 2-2 3-4 3h-2v4"/></svg>',
    settings:'<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21h-4v-.08A1.7 1.7 0 0 0 8.97 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15 1.7 1.7 0 0 0 3.08 14H3v-4h.08A1.7 1.7 0 0 0 4.6 8.97a1.7 1.7 0 0 0-.34-1.88l-.06-.06L7.03 4.2l.06.06A1.7 1.7 0 0 0 8.97 4.6 1.7 1.7 0 0 0 10 3.08V3h4v.08a1.7 1.7 0 0 0 1.03 1.52 1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 8.97 1.7 1.7 0 0 0 20.92 10H21v4h-.08A1.7 1.7 0 0 0 19.4 15z"/></svg>',
    menu:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>',
    search:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
    bell:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M10 21h4"/></svg>',
    plus:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>',
    chevron:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>',
    income:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v14"/><path d="m7 8 5-5 5 5"/><path d="M5 21h14"/></svg>',
    expense:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V7"/><path d="m17 16-5 5-5-5"/><path d="M5 3h14"/></svg>',
    profit:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 14s1 2 4 2 4-1.5 4-3-1-2-4-2-4-1-4-3 1.2-3 4-3 4 2 4 2"/></svg>',
    receipt:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg>',
    edit:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"/></svg>',
    trash:'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 15H6L5 6M10 11v6M14 11v6"/></svg>',
    close:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>',
    download:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>',
    upload:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>',
    print:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="7"/></svg>'
  };
  const icon=name=>ICONS[name]||'';
  const esc=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
  const uid=()=>`${Date.now().toString(36)}${Math.random().toString(36).slice(2,8)}`;
  const localDate=(date=new Date())=>{const copy=new Date(date.getTime()-date.getTimezoneOffset()*60000);return copy.toISOString().slice(0,10)};
  const dateOffset=days=>{const date=new Date();date.setDate(date.getDate()+days);return localDate(date)};
  const startOfMonth=()=>{const date=new Date();date.setDate(1);return localDate(date)};
  const fmtMoney=value=>`${new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Number(value)||0)} ${CURRENCY}`;
  const fmtDate=value=>{if(!value)return '—';const [year,month,day]=value.split('-');return `${day}.${month}.${year}`};
  const inRange=(date,from,to)=>date>=from&&date<=to;
  const sum=(items,getValue=item=>item)=>items.reduce((total,item)=>total+(Number(getValue(item))||0),0);
  const q=(selector,root=document)=>root.querySelector(selector);
  const qa=(selector,root=document)=>[...root.querySelectorAll(selector)];

  function initialState(){
    return {
      version:2,
      company:{name:'GRILL BISHKEK',phone:'+996 709 39 38 37'},
      branches:[
        {id:'akhunbaeva',name:'Ахунбаева',address:'Ахунбаева 186/2',phone:'+996 709 39 38 37'},
        {id:'jal',name:'Джал',address:'Джал-29, дом 17',phone:'+996 703 05 00 01'},
        {id:'umutalieva',name:'Умуталиева',address:'Умуталиева 120',phone:'+996 709 39 38 37'}
      ],
      profits:[],
      expenses:[]
    };
  }
  function load(){
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      if(!raw)return initialState();
      const parsed=JSON.parse(raw);
      if(!parsed||!Array.isArray(parsed.profits)||!Array.isArray(parsed.expenses)||!Array.isArray(parsed.branches))throw new Error('bad');
      return parsed;
    }catch{return initialState()}
  }
  let state=load();
  let activeView='dashboard';
  let financeRange={from:startOfMonth(),to:localDate()};
  const save=()=>localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  const branchName=id=>state.branches.find(branch=>branch.id===id)?.name||'Неизвестный филиал';

  function toast(message,type='success'){
    const wrap=q('#toastWrap');
    const element=document.createElement('div');
    element.className=`toast ${type}`;
    element.textContent=message;
    wrap.appendChild(element);
    setTimeout(()=>element.remove(),2600);
  }
  function download(name,text,type='application/json'){
    const blob=new Blob([text],{type});
    const link=document.createElement('a');
    link.href=URL.createObjectURL(blob);
    link.download=name;
    document.body.appendChild(link);
    link.click();
    setTimeout(()=>{URL.revokeObjectURL(link.href);link.remove()},200);
  }
  function modal({title,subtitle='',body='',onSubmit=null,submitText='Сохранить'}){
    const root=q('#modalRoot');
    root.innerHTML=`<div class="modal" role="dialog" aria-modal="true"><div class="modal-head"><div><h3>${esc(title)}</h3><p>${esc(subtitle)}</p></div><button class="icon-btn modal-close" type="button">${icon('close')}</button></div><form id="modalForm"><div class="modal-body">${body}</div><div class="modal-foot"><button class="btn btn-outline modal-close" type="button">Отмена</button>${onSubmit?`<button class="btn btn-primary" type="submit">${esc(submitText)}</button>`:''}</div></form></div>`;
    root.classList.add('open');
    root.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
    qa('.modal-close',root).forEach(button=>button.onclick=closeModal);
    root.onclick=event=>{if(event.target===root)closeModal()};
    if(onSubmit)q('#modalForm',root).onsubmit=event=>{event.preventDefault();onSubmit(new FormData(event.currentTarget),event.currentTarget)};
    setTimeout(()=>q('input,select,button',root)?.focus(),30);
    return root;
  }
  function closeModal(){
    const root=q('#modalRoot');
    root.classList.remove('open');
    root.setAttribute('aria-hidden','true');
    document.body.style.overflow='';
    setTimeout(()=>root.innerHTML='',180);
  }
  function confirmDialog(title,text,onConfirm){
    modal({title,subtitle:text,body:'<div class="note-box">Действие нельзя отменить. При необходимости сначала скачайте резервную копию.</div>',onSubmit:()=>{closeModal();onConfirm()},submitText:'Подтвердить'});
  }

  function metrics(from,to,branchId='all'){
    const profits=state.profits.filter(item=>inRange(item.date,from,to)&&(branchId==='all'||item.branchId===branchId));
    const expenses=state.expenses.filter(item=>inRange(item.date,from,to)&&(branchId==='all'||item.branchId===branchId));
    const income=sum(profits,item=>item.amount);
    const spending=sum(expenses,item=>item.amount);
    return {profits,expenses,income,spending,result:income-spending,count:profits.length+expenses.length};
  }
  function periodDays(from,to){
    const result=[];
    let day=new Date(`${from}T00:00:00`);
    const end=new Date(`${to}T00:00:00`);
    while(day<=end&&result.length<62){result.push(localDate(day));day.setDate(day.getDate()+1)}
    return result;
  }
  function branchMetrics(from,to){return state.branches.map(branch=>({branch,...metrics(from,to,branch.id)}))}
  function getAlerts(){
    return branchMetrics(startOfMonth(),localDate())
      .filter(item=>item.result<0)
      .map(item=>({title:`Отрицательный итог: ${item.branch.name}`,text:`Результат за месяц ${fmtMoney(item.result)}.`,view:'finance'}));
  }

  function viewHead(eyebrow,title,description,actions=''){
    return `<div class="view-head"><div><div class="eyebrow">${esc(eyebrow)}</div><h2>${esc(title)}</h2><p>${esc(description)}</p></div><div class="view-actions">${actions}</div></div>`;
  }
  function metricCard(label,value,helper,iconName,tone){
    return `<article class="metric tone-${tone}"><div class="metric-top"><span class="metric-label">${esc(label)}</span><span class="metric-icon">${icon(iconName)}</span></div><div class="metric-value">${esc(value)}</div><div class="metric-helper">${esc(helper)}</div></article>`;
  }
  function emptyBlock(title,text,button=''){
    return `<div class="empty"><div class="empty-icon">${icon('receipt')}</div><h3>${esc(title)}</h3><p>${esc(text)}</p>${button?`<div style="margin-top:16px">${button}</div>`:''}</div>`;
  }

  function renderNav(){
    q('#nav').innerHTML=NAV.map(item=>`<button class="nav-btn ${item.id===activeView?'active':''}" type="button" data-nav="${item.id}"><span class="nav-icon">${icon(item.icon)}</span><span class="nav-copy"><b>${item.label}</b><small>${item.desc}</small></span></button>`).join('');
    qa('[data-nav]').forEach(button=>button.onclick=()=>navigate(button.dataset.nav));
  }
  function navigate(view){
    activeView=view;
    qa('.view').forEach(section=>section.classList.toggle('active',section.dataset.view===view));
    renderNav();
    q('#topTitle').textContent=NAV.find(item=>item.id===view)?.label||'GRILL BISHKEK CRM';
    closeMobile();
    renderActive();
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function renderActive(){
    ({dashboard:renderDashboard,sales:renderProfits,expenses:renderExpenses,finance:renderFinance,branches:renderBranches,settings:renderSettings}[activeView]||renderDashboard)();
    renderAlerts();
  }

  function renderDashboard(){
    const from=startOfMonth();
    const to=localDate();
    const current=metrics(from,to);
    const branches=branchMetrics(from,to);
    const maxIncome=Math.max(...branches.map(item=>item.income),1);
    const days=periodDays(dateOffset(-13),to);
    const chartMax=Math.max(...days.flatMap(day=>{const item=metrics(day,day);return [item.income,item.spending]}),1);
    const latest=[...state.profits].sort((a,b)=>`${b.date}${b.createdAt||''}`.localeCompare(`${a.date}${a.createdAt||''}`)).slice(0,6);
    q('[data-view="dashboard"]').innerHTML=`
      ${viewHead('Панель управления','Вся сеть на одном экране','Добавляйте только прибыль и расходы — система сама покажет итог по каждому филиалу.',`<button class="btn btn-primary" data-add-profit>${icon('plus')} Добавить прибыль</button><button class="btn btn-outline" data-add-expense>${icon('plus')} Добавить расход</button>`)}
      <div class="metric-grid">
        ${metricCard('Добавлено прибыли',fmtMoney(current.income),'Сумма за текущий месяц','income','green')}
        ${metricCard('Все расходы',fmtMoney(current.spending),'Сумма за текущий месяц','expense','red')}
        ${metricCard('Чистый результат',fmtMoney(current.result),current.result>=0?'Прибыль минус расходы':'Расходы выше прибыли','profit',current.result>=0?'yellow':'red')}
        ${metricCard('Операции',String(current.count),`${current.profits.length} прибыли · ${current.expenses.length} расходов`,'receipt','violet')}
      </div>
      <div class="grid-2">
        <article class="card"><div class="card-head"><div><h3>Динамика денег</h3><p>Последние 14 дней: прибыль и расходы</p></div></div><div class="card-body"><div class="chart-wrap">${days.map(day=>{const item=metrics(day,day);return `<div class="chart-col"><div class="chart-bars"><div class="bar bar-income" title="Прибыль ${fmtMoney(item.income)}" style="height:${Math.max(item.income/chartMax*100,item.income?3:1)}%"></div><div class="bar bar-expense" title="Расходы ${fmtMoney(item.spending)}" style="height:${Math.max(item.spending/chartMax*100,item.spending?3:1)}%"></div></div><span class="chart-label">${fmtDate(day).slice(0,5)}</span></div>`}).join('')}</div><div class="chart-legend"><span><i class="legend-dot" style="background:var(--yellow)"></i>Прибыль</span><span><i class="legend-dot" style="background:var(--red)"></i>Расходы</span></div></div></article>
        <article class="card"><div class="card-head"><div><h3>Филиалы за месяц</h3><p>Сравнение прибыли и итогового результата</p></div><button class="btn btn-soft btn-sm" data-go="branches">Подробнее</button></div><div class="card-body"><div class="branch-list">${branches.map(item=>`<div class="branch-mini"><div class="branch-mini-top"><span class="branch-name">${esc(item.branch.name)}</span><span class="branch-revenue">${fmtMoney(item.income)}</span></div><div class="branch-mini-sub"><span>расходы ${fmtMoney(item.spending)}</span><span class="${item.result>=0?'positive':'negative'}">итог ${fmtMoney(item.result)}</span></div><div class="progress"><span style="width:${item.income/maxIncome*100}%"></span></div></div>`).join('')}</div></div></article>
      </div>
      <div class="grid-half">
        <article class="card table-card"><div class="card-head"><div><h3>Последняя прибыль</h3><p>Последние добавленные суммы</p></div><button class="btn btn-soft btn-sm" data-go="sales">Все записи</button></div><div class="card-body">${latest.length?`<div class="branch-list">${latest.map(item=>`<div class="branch-mini"><div class="branch-mini-top"><div><div class="branch-name">${esc(branchName(item.branchId))}</div><div class="cell-sub">${fmtDate(item.date)}</div></div><div class="branch-revenue positive">${fmtMoney(item.amount)}</div></div></div>`).join('')}</div>`:emptyBlock('Прибыль пока не добавлена','Добавьте первую сумму — показатели пересчитаются автоматически.')}</div></article>
        <article class="card"><div class="card-head"><div><h3>Контроль бизнеса</h3><p>Филиалы с отрицательным итогом</p></div></div><div class="card-body"><div class="rank-list">${getAlerts().length?getAlerts().map(alert=>`<button class="search-result" data-go="${alert.view}" type="button"><span class="search-result-icon">${icon('chart')}</span><span><b>${esc(alert.title)}</b><span>${esc(alert.text)}</span></span></button>`).join(''):`<div class="note-box" style="color:#126b45;background:#edf9f2;border-color:#bce7cf">Сейчас нет филиалов с отрицательным итогом.</div>`}</div></div></article>
      </div>`;
    bindCommon();
  }

  function renderProfits(){
    const sorted=[...state.profits].sort((a,b)=>`${b.date}${b.createdAt||''}`.localeCompare(`${a.date}${a.createdAt||''}`));
    q('[data-view="sales"]').innerHTML=`
      ${viewHead('Учёт прибыли','Прибыль по филиалам','Добавляйте только сумму и филиал. Дата сохраняется автоматически.',`<button class="btn btn-primary" data-add-profit>${icon('plus')} Добавить прибыль</button>`)}
      <article class="card table-card">
        <div class="table-tools"><label class="search-input">${icon('search')}<input id="profitSearch" placeholder="Поиск по филиалу или сумме"></label><select class="control" id="profitBranch"><option value="all">Все филиалы</option>${state.branches.map(branch=>`<option value="${branch.id}">${esc(branch.name)}</option>`).join('')}</select></div>
        <div id="profitTable"></div>
      </article>`;
    const renderTable=()=>{
      const query=(q('#profitSearch')?.value||'').trim().toLowerCase();
      const branch=q('#profitBranch')?.value||'all';
      const rows=sorted.filter(item=>(branch==='all'||item.branchId===branch)&&[branchName(item.branchId),item.amount,fmtDate(item.date)].join(' ').toLowerCase().includes(query));
      q('#profitTable').innerHTML=rows.length?`<div class="table-scroll"><table class="data-table"><thead><tr><th>Дата</th><th>Филиал</th><th>Сумма прибыли</th><th>Действия</th></tr></thead><tbody>${rows.map(item=>`<tr><td><div class="cell-title">${fmtDate(item.date)}</div></td><td><div class="cell-title">${esc(branchName(item.branchId))}</div></td><td><span class="money positive">${fmtMoney(item.amount)}</span></td><td><div class="action-row"><button class="action-btn" data-edit-profit="${item.id}" title="Редактировать">${icon('edit')}</button><button class="action-btn danger" data-delete-profit="${item.id}" title="Удалить">${icon('trash')}</button></div></td></tr>`).join('')}</tbody></table></div>`:emptyBlock('Записей пока нет','Добавьте первую прибыль для нужного филиала.',`<button class="btn btn-primary" data-add-profit>${icon('plus')} Добавить прибыль</button>`);
      qa('[data-edit-profit]').forEach(button=>button.onclick=()=>openProfitModal(button.dataset.editProfit));
      qa('[data-delete-profit]').forEach(button=>button.onclick=()=>confirmDialog('Удалить прибыль?','Эта сумма будет удалена из отчётов.',()=>{state.profits=state.profits.filter(item=>item.id!==button.dataset.deleteProfit);save();renderProfits();renderAlerts();toast('Запись удалена')}));
      bindCommon(q('#profitTable'));
    };
    q('#profitSearch').oninput=renderTable;
    q('#profitBranch').onchange=renderTable;
    renderTable();
    bindCommon();
  }

  function renderExpenses(){
    const sorted=[...state.expenses].sort((a,b)=>`${b.date}${b.createdAt||''}`.localeCompare(`${a.date}${a.createdAt||''}`));
    q('[data-view="expenses"]').innerHTML=`
      ${viewHead('Учёт расходов','Расходы по филиалам','Добавляйте только сумму расхода и филиал. Дата сохраняется автоматически.',`<button class="btn btn-primary" data-add-expense>${icon('plus')} Добавить расход</button>`)}
      <article class="card table-card">
        <div class="table-tools"><label class="search-input">${icon('search')}<input id="expenseSearch" placeholder="Поиск по филиалу или сумме"></label><select class="control" id="expenseBranch"><option value="all">Все филиалы</option>${state.branches.map(branch=>`<option value="${branch.id}">${esc(branch.name)}</option>`).join('')}</select></div>
        <div id="expenseTable"></div>
      </article>`;
    const renderTable=()=>{
      const query=(q('#expenseSearch')?.value||'').trim().toLowerCase();
      const branch=q('#expenseBranch')?.value||'all';
      const rows=sorted.filter(item=>(branch==='all'||item.branchId===branch)&&[branchName(item.branchId),item.amount,fmtDate(item.date)].join(' ').toLowerCase().includes(query));
      q('#expenseTable').innerHTML=rows.length?`<div class="table-scroll"><table class="data-table"><thead><tr><th>Дата</th><th>Филиал</th><th>Сумма расхода</th><th>Действия</th></tr></thead><tbody>${rows.map(item=>`<tr><td><div class="cell-title">${fmtDate(item.date)}</div></td><td><div class="cell-title">${esc(branchName(item.branchId))}</div></td><td><span class="money negative">${fmtMoney(item.amount)}</span></td><td><div class="action-row"><button class="action-btn" data-edit-expense="${item.id}" title="Редактировать">${icon('edit')}</button><button class="action-btn danger" data-delete-expense="${item.id}" title="Удалить">${icon('trash')}</button></div></td></tr>`).join('')}</tbody></table></div>`:emptyBlock('Расходов пока нет','Добавьте первый расход для нужного филиала.',`<button class="btn btn-primary" data-add-expense>${icon('plus')} Добавить расход</button>`);
      qa('[data-edit-expense]').forEach(button=>button.onclick=()=>openExpenseModal(button.dataset.editExpense));
      qa('[data-delete-expense]').forEach(button=>button.onclick=()=>confirmDialog('Удалить расход?','Эта сумма будет удалена из отчётов.',()=>{state.expenses=state.expenses.filter(item=>item.id!==button.dataset.deleteExpense);save();renderExpenses();renderAlerts();toast('Расход удалён')}));
      bindCommon(q('#expenseTable'));
    };
    q('#expenseSearch').oninput=renderTable;
    q('#expenseBranch').onchange=renderTable;
    renderTable();
    bindCommon();
  }

  function renderFinance(){
    const current=metrics(financeRange.from,financeRange.to);
    const branches=branchMetrics(financeRange.from,financeRange.to);
    const max=Math.max(...branches.map(item=>Math.max(item.income,item.spending)),1);
    q('[data-view="finance"]').innerHTML=`
      ${viewHead('Финансы','Финансовый отчёт','Выберите период и посмотрите прибыль, расходы и итог.',`<button class="btn btn-outline" id="printReport">${icon('print')} Печать</button>`)}
      <div class="table-tools card" style="margin-bottom:18px"><div class="field"><label>С даты</label><input class="control" id="financeFrom" type="date" value="${financeRange.from}"></div><div class="field"><label>По дату</label><input class="control" id="financeTo" type="date" value="${financeRange.to}"></div><button class="btn btn-primary" id="applyFinance">Показать</button></div>
      <div class="summary-strip">
        <div class="summary-item"><span>Прибыль</span><strong class="positive">${fmtMoney(current.income)}</strong><small>${current.profits.length} записей</small></div>
        <div class="summary-item"><span>Расходы</span><strong class="negative">${fmtMoney(current.spending)}</strong><small>${current.expenses.length} записей</small></div>
        <div class="summary-item"><span>Чистый итог</span><strong class="${current.result>=0?'positive':'negative'}">${fmtMoney(current.result)}</strong><small>Прибыль минус расходы</small></div>
      </div>
      <div class="report-grid">
        <article class="card"><div class="card-head"><div><h3>Результат по филиалам</h3><p>${fmtDate(financeRange.from)} — ${fmtDate(financeRange.to)}</p></div></div><div class="card-body"><div class="rank-list">${branches.map(item=>`<div class="rank-row"><div class="rank-main"><div class="rank-title"><span>${esc(item.branch.name)}</span><span class="${item.result>=0?'positive':'negative'}">${fmtMoney(item.result)}</span></div><div class="rank-sub">Прибыль ${fmtMoney(item.income)} · расходы ${fmtMoney(item.spending)}</div><div class="rank-bar"><span style="width:${Math.max(item.income,item.spending)/max*100}%"></span></div></div></div>`).join('')}</div></div></article>
        <article class="card"><div class="card-head"><div><h3>Общий итог</h3><p>Сводка выбранного периода</p></div></div><div class="card-body"><div class="branch-list"><div class="branch-mini"><div class="branch-mini-top"><span class="branch-name">Вся сеть</span><span class="branch-revenue ${current.result>=0?'positive':'negative'}">${fmtMoney(current.result)}</span></div><div class="branch-mini-sub"><span>Прибыль ${fmtMoney(current.income)}</span><span>Расходы ${fmtMoney(current.spending)}</span></div></div></div></div></article>
      </div>`;
    q('#applyFinance').onclick=()=>{const from=q('#financeFrom').value,to=q('#financeTo').value;if(!from||!to||from>to){toast('Проверьте выбранный период','error');return}financeRange={from,to};renderFinance()};
    q('#printReport').onclick=()=>window.print();
  }

  function renderBranches(){
    const items=branchMetrics(startOfMonth(),localDate());
    q('[data-view="branches"]').innerHTML=`
      ${viewHead('Филиалы','Результаты трёх филиалов','Показатели за текущий месяц на основе добавленной прибыли и расходов.')}
      <div class="branch-cards">${items.map((item,index)=>`<article class="branch-card"><div class="branch-index">ФИЛИАЛ ${String(index+1).padStart(2,'0')}</div><h3>${esc(item.branch.name)}</h3><address>${esc(item.branch.address)}</address><div class="branch-stat-grid"><div class="branch-stat"><span>Прибыль</span><strong class="positive">${fmtMoney(item.income)}</strong></div><div class="branch-stat"><span>Расходы</span><strong class="negative">${fmtMoney(item.spending)}</strong></div><div class="branch-stat"><span>Итог</span><strong class="${item.result>=0?'positive':'negative'}">${fmtMoney(item.result)}</strong></div><div class="branch-stat"><span>Операции</span><strong>${item.count}</strong></div></div></article>`).join('')}</div>`;
  }

  function renderSettings(){
    q('[data-view="settings"]').innerHTML=`
      ${viewHead('Настройки','Настройки системы','Здесь можно изменить данные компании, сохранить резервную копию или очистить операции.')}
      <div class="settings-grid">
        <article class="card"><div class="card-head"><div><h3>Данные компании</h3><p>Название и контактный номер</p></div></div><div class="card-body"><div class="form-grid"><div class="field full"><label>Название</label><input id="companyName" value="${esc(state.company.name)}"></div><div class="field full"><label>Телефон</label><input id="companyPhone" value="${esc(state.company.phone)}"></div></div><button class="btn btn-primary" id="saveCompany" style="margin-top:13px">Сохранить</button></div></article>
        <div>
          <article class="card settings-section"><div class="card-head"><div><h3>Резервная копия</h3><p>Перенос данных между устройствами</p></div></div><div class="card-body"><div class="note-box">Данные хранятся в этом браузере. Перед сменой устройства скачайте резервную копию.</div><div style="display:grid;gap:9px;margin-top:13px"><button class="btn btn-dark" id="exportBackup">${icon('download')} Скачать резервную копию</button><button class="btn btn-outline" id="importBackup">${icon('upload')} Загрузить резервную копию</button></div></div></article>
          <article class="settings-section danger-zone"><h4>Очистить все данные</h4><p>Вся добавленная прибыль и расходы будут удалены. После очистки показатели снова станут нулевыми.</p><button class="btn btn-red btn-sm" id="clearAll">Очистить операции</button></article>
        </div>
      </div>`;
    q('#saveCompany').onclick=()=>{state.company.name=q('#companyName').value.trim()||'GRILL BISHKEK';state.company.phone=q('#companyPhone').value.trim();save();toast('Данные компании сохранены')};
    q('#exportBackup').onclick=()=>download(`grill-bishkek-backup-${localDate()}.json`,JSON.stringify(state,null,2));
    q('#importBackup').onclick=()=>q('#importInput').click();
    q('#clearAll').onclick=()=>confirmDialog('Очистить все операции?','Прибыль и расходы будут удалены, показатели станут нулевыми.',()=>{state.profits=[];state.expenses=[];save();renderSettings();renderAlerts();toast('Все операции удалены')});
  }

  function openProfitModal(id=null){
    const existing=id?state.profits.find(item=>item.id===id):null;
    const item=existing||{branchId:state.branches[0].id,amount:''};
    modal({
      title:existing?'Редактировать прибыль':'Добавить прибыль',
      subtitle:'Укажите только филиал и сумму.',
      body:`<div class="form-grid"><div class="field full"><label>Филиал</label><select name="branchId">${state.branches.map(branch=>`<option value="${branch.id}" ${branch.id===item.branchId?'selected':''}>${esc(branch.name)} — ${esc(branch.address)}</option>`).join('')}</select></div><div class="field full"><label>Сумма прибыли</label><input name="amount" type="number" min="1" step="1" inputmode="numeric" value="${item.amount}" placeholder="Введите сумму" required></div></div>`,
      onSubmit:formData=>{
        const amount=Math.max(0,Number(formData.get('amount'))||0);
        if(amount<=0){toast('Введите сумму больше нуля','error');return}
        const record={id:existing?.id||uid(),date:existing?.date||localDate(),createdAt:existing?.createdAt||new Date().toISOString(),branchId:formData.get('branchId'),amount};
        if(existing)state.profits=state.profits.map(current=>current.id===existing.id?record:current);else state.profits.push(record);
        save();closeModal();renderActive();toast(existing?'Прибыль обновлена':'Прибыль добавлена');
      },
      submitText:existing?'Сохранить':'Добавить прибыль'
    });
  }

  function openExpenseModal(id=null){
    const existing=id?state.expenses.find(item=>item.id===id):null;
    const item=existing||{branchId:state.branches[0].id,amount:''};
    modal({
      title:existing?'Редактировать расход':'Добавить расход',
      subtitle:'Укажите только филиал и сумму.',
      body:`<div class="form-grid"><div class="field full"><label>Филиал</label><select name="branchId">${state.branches.map(branch=>`<option value="${branch.id}" ${branch.id===item.branchId?'selected':''}>${esc(branch.name)} — ${esc(branch.address)}</option>`).join('')}</select></div><div class="field full"><label>Сумма расхода</label><input name="amount" type="number" min="1" step="1" inputmode="numeric" value="${item.amount}" placeholder="Введите сумму" required></div></div>`,
      onSubmit:formData=>{
        const amount=Math.max(0,Number(formData.get('amount'))||0);
        if(amount<=0){toast('Введите сумму больше нуля','error');return}
        const record={id:existing?.id||uid(),date:existing?.date||localDate(),createdAt:existing?.createdAt||new Date().toISOString(),branchId:formData.get('branchId'),amount};
        if(existing)state.expenses=state.expenses.map(current=>current.id===existing.id?record:current);else state.expenses.push(record);
        save();closeModal();renderActive();toast(existing?'Расход обновлён':'Расход добавлен');
      },
      submitText:existing?'Сохранить':'Добавить расход'
    });
  }

  function renderAlerts(){
    const alerts=getAlerts();
    const panel=q('#notificationPanel');
    const badge=q('#notificationBadge');
    badge.hidden=!alerts.length;
    badge.textContent=alerts.length>9?'9+':alerts.length;
    panel.innerHTML=`<div class="panel-title"><b>Уведомления</b><button class="action-btn" id="closeAlerts">${icon('close')}</button></div>${alerts.length?alerts.map(alert=>`<button class="alert-item" data-alert-view="${alert.view}" type="button" style="width:100%;border:0;background:transparent;text-align:left"><span class="alert-icon">!</span><span class="alert-copy"><b>${esc(alert.title)}</b><span>${esc(alert.text)}</span></span></button>`).join(''):`<div class="alert-empty">Всё в порядке — новых уведомлений нет.</div>`}`;
    q('#closeAlerts').onclick=()=>panel.classList.remove('open');
    qa('[data-alert-view]').forEach(button=>button.onclick=()=>{panel.classList.remove('open');navigate(button.dataset.alertView)});
  }
  function openSearch(){
    modal({title:'Быстрый поиск',subtitle:'Поиск прибыли, расходов и филиалов.',body:`<label class="search-input" style="width:100%;height:48px">${icon('search')}<input id="globalSearch" placeholder="Введите филиал или сумму" autocomplete="off"></label><div class="search-modal-results" id="searchResults"></div>`});
    const input=q('#globalSearch');
    const host=q('#searchResults');
    const run=()=>{
      const value=input.value.trim().toLowerCase();
      if(!value){host.innerHTML='<div class="alert-empty">Введите филиал или сумму.</div>';return}
      const results=[];
      state.profits.filter(item=>[branchName(item.branchId),item.amount,fmtDate(item.date)].join(' ').toLowerCase().includes(value)).slice(0,6).forEach(item=>results.push({view:'sales',icon:'income',title:`Прибыль · ${branchName(item.branchId)}`,text:`${fmtDate(item.date)} · ${fmtMoney(item.amount)}`}));
      state.expenses.filter(item=>[branchName(item.branchId),item.amount,fmtDate(item.date)].join(' ').toLowerCase().includes(value)).slice(0,6).forEach(item=>results.push({view:'expenses',icon:'wallet',title:`Расход · ${branchName(item.branchId)}`,text:`${fmtDate(item.date)} · ${fmtMoney(item.amount)}`}));
      state.branches.filter(branch=>[branch.name,branch.address].join(' ').toLowerCase().includes(value)).forEach(branch=>results.push({view:'branches',icon:'branch',title:branch.name,text:branch.address}));
      host.innerHTML=results.length?results.map(result=>`<button class="search-result" data-search-view="${result.view}" type="button"><span class="search-result-icon">${icon(result.icon)}</span><span><b>${esc(result.title)}</b><span>${esc(result.text)}</span></span></button>`).join(''):'<div class="alert-empty">Ничего не найдено.</div>';
      qa('[data-search-view]',host).forEach(button=>button.onclick=()=>{closeModal();navigate(button.dataset.searchView)});
    };
    input.oninput=run;
    setTimeout(()=>input.focus(),50);
  }

  function bindCommon(root=document){
    qa('[data-add-profit]',root).forEach(button=>button.onclick=()=>openProfitModal());
    qa('[data-add-expense]',root).forEach(button=>button.onclick=()=>openExpenseModal());
    qa('[data-go]',root).forEach(button=>button.onclick=()=>navigate(button.dataset.go));
  }
  function openMobile(){q('#sidebar').classList.add('mobile-open');q('#drawerBackdrop').classList.add('open');document.body.style.overflow='hidden'}
  function closeMobile(){q('#sidebar').classList.remove('mobile-open');q('#drawerBackdrop').classList.remove('open');document.body.style.overflow=''}
  function init(){
    q('#menuBtn').innerHTML=icon('menu');
    q('#mobileSearchBtn').innerHTML=icon('search');
    q('#notificationBtn').innerHTML=icon('bell');
    q('#addSaleTop').innerHTML=`${icon('plus')} Добавить прибыль`;
    q('#mobileFab').innerHTML=icon('plus');
    q('#collapseIcon').innerHTML=icon('chevron');
    q('#menuBtn').onclick=openMobile;
    q('#drawerBackdrop').onclick=closeMobile;
    q('#collapseBtn').onclick=()=>q('#sidebar').classList.toggle('collapsed');
    q('#searchBtn').onclick=openSearch;
    q('#mobileSearchBtn').onclick=openSearch;
    q('#notificationBtn').onclick=event=>{event.stopPropagation();q('#notificationPanel').classList.toggle('open')};
    q('#addSaleTop').onclick=()=>openProfitModal();
    q('#mobileFab').onclick=()=>openProfitModal();
    document.addEventListener('click',event=>{if(!q('#notificationPanel').contains(event.target)&&!q('#notificationBtn').contains(event.target))q('#notificationPanel').classList.remove('open')});
    document.addEventListener('keydown',event=>{if((event.ctrlKey||event.metaKey)&&event.key.toLowerCase()==='k'){event.preventDefault();openSearch()}if(event.key==='Escape'){closeModal();closeMobile();q('#notificationPanel').classList.remove('open')}});
    q('#importInput').onchange=async event=>{
      const file=event.target.files?.[0];
      if(!file)return;
      try{
        const data=JSON.parse(await file.text());
        if(!Array.isArray(data.profits)||!Array.isArray(data.expenses)||!Array.isArray(data.branches))throw new Error('invalid');
        state=data;
        save();
        renderActive();
        toast('Резервная копия загружена');
      }catch{toast('Файл резервной копии повреждён','error')}
      event.target.value='';
    };
    renderNav();
    renderActive();
  }
  init();

  </script>
</body>
</html>
